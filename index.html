<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵星抵达证明 - 纪念票根打印机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap');
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a1c2e 0%, #2d1b4e 50%, #1a1c2e 100%);
            min-height: 100vh;
        }
        
        .ticket-texture {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,215,0,0.02) 0%, transparent 50%);
        }
        
        .perforation {
            background-image: radial-gradient(circle, transparent 6px, #f5f5dc 6px);
            background-size: 20px 20px;
            background-position: center;
            height: 20px;
            width: 100%;
            position: relative;
        }
        
        .perforation::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 2px dashed #d4c4a8;
        }
        
        .stamp {
            transform: rotate(-15deg);
            border: 3px solid #c41e3a;
            color: #c41e3a;
            font-weight: 900;
            letter-spacing: 4px;
            mask-image: url("data:image/svg+xml,%3Csvg width='200' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='200' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
        }
        
        .cat-silhouette {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .glow-text {
            text-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.1);
        }
        
        .paper-shadow {
            box-shadow: 
                0 1px 1px rgba(0,0,0,0.15), 
                0 10px 0 -5px #eee, 
                0 10px 1px -4px rgba(0,0,0,0.15), 
                0 20px 0 -10px #eee, 
                0 20px 1px -9px rgba(0,0,0,0.15);
        }
        
        .star-twinkle {
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .print-btn:active {
            transform: scale(0.95);
        }
        
        .ticket-paper {
            background: #f5f5dc;
            background-image: 
                linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        
        .handwritten {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-style: italic;
        }
        
        .qr-placeholder {
            background: 
                linear-gradient(45deg, #000 25%, transparent 25%), 
                linear-gradient(-45deg, #000 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #000 75%), 
                linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
            background-color: white;
        }
        
        .tear-edge {
            clip-path: polygon(
                0% 0%, 5% 1%, 10% 0%, 15% 1%, 20% 0%, 25% 1%, 30% 0%, 35% 1%, 
                40% 0%, 45% 1%, 50% 0%, 55% 1%, 60% 0%, 65% 1%, 70% 0%, 75% 1%, 
                80% 0%, 85% 1%, 90% 0%, 95% 1%, 100% 0%, 100% 100%, 95% 99%, 
                90% 100%, 85% 99%, 80% 100%, 75% 99%, 70% 100%, 65% 99%, 
                60% 100%, 55% 99%, 50% 100%, 45% 99%, 40% 100%, 35% 99%, 
                30% 100%, 25% 99%, 20% 100%, 15% 99%, 10% 100%, 5% 99%, 0% 100%
            );
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
        }
        
        .select-arrow {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            appearance: none;
        }
    </style>
<base target="_blank">
</head>
<body class="antialiased overflow-x-hidden">

    <!-- 背景星星 -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="star-twinkle absolute top-10 left-10 text-yellow-200 text-2xl opacity-60">✦</div>
        <div class="star-twinkle absolute top-32 right-20 text-yellow-100 text-lg opacity-40" style="animation-delay: 1s;">✧</div>
        <div class="star-twinkle absolute top-60 left-1/4 text-white text-xl opacity-30" style="animation-delay: 2s;">✦</div>
        <div class="star-twinkle absolute bottom-40 right-1/3 text-yellow-200 text-2xl opacity-50" style="animation-delay: 1.5s;">✧</div>
        <div class="star-twinkle absolute top-20 left-2/3 text-white text-lg opacity-40" style="animation-delay: 0.5s;">✦</div>
    </div>

    <div class="relative z-10 container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- 标题区 -->
        <header class="text-center mb-12 float">
            <div class="inline-block relative">
                <h1 class="text-4xl md:text-6xl font-black text-yellow-100 glow-text tracking-widest mb-2" style="font-family: 'ZCOOL XiaoWei', serif;">
                    喵星抵达证明
                </h1>
                <div class="text-yellow-200/60 text-sm md:text-base tracking-[0.5em] uppercase mt-2">Meow Star Arrival Certificate</div>
                <div class="absolute -top-6 -right-8 text-4xl animate-bounce" style="animation-duration: 3s;">🐾</div>
            </div>
            <p class="text-purple-200/70 mt-4 text-sm md:text-base max-w-lg mx-auto leading-relaxed">
                每一只离去的喵星人，都会化作喵星的一颗星。<br>
                在这里，为它们打印一张抵达证明，也为主人留下一句温暖的寄语。
            </p>
        </header>

        <div class="grid lg:grid-cols-2 gap-12 items-start">
            
            <!-- 配置面板 -->
            <div class="space-y-6">
                <div class="bg-white/5 backdrop-blur-sm rounded-2xl p-6 md:p-8 border border-white/10 shadow-2xl">
                    <h2 class="text-xl font-bold text-yellow-100 mb-6 flex items-center gap-2">
                        <span class="text-2xl">🎫</span> 票根信息填写
                    </h2>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-purple-200 text-sm mb-2 font-medium">喵星人姓名</label>
                            <input type="text" id="catName" placeholder="例如：咪咪、橘子、汤圆..." 
                                class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-yellow-50 placeholder-white/30 transition-all">
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="min-w-0">
                                <label class="block text-purple-200 text-sm mb-2 font-medium">抵达日期</label>
                                <input type="date" id="arrivalDate" 
                                    class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-yellow-50 placeholder-white/30 transition-all">
                            </div>
                            <div class="min-w-0">
                                <label class="block text-purple-200 text-sm mb-2 font-medium">星座（可选）</label>
                                <select id="catSign" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-yellow-50 select-arrow transition-all">
                                    <option value="">选择星座</option>
                                    <option value="白羊座">♈ 白羊座</option>
                                    <option value="金牛座">♉ 金牛座</option>
                                    <option value="双子座">♊ 双子座</option>
                                    <option value="巨蟹座">♋ 巨蟹座</option>
                                    <option value="狮子座">♌ 狮子座</option>
                                    <option value="处女座">♍ 处女座</option>
                                    <option value="天秤座">♎ 天秤座</option>
                                    <option value="天蝎座">♏ 天蝎座</option>
                                    <option value="射手座">♐ 射手座</option>
                                    <option value="摩羯座">♑ 摩羯座</option>
                                    <option value="水瓶座">♒ 水瓶座</option>
                                    <option value="双鱼座">♓ 双鱼座</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-purple-200 text-sm mb-2 font-medium">寄语风格</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="setStyle('gentle')" class="style-btn active px-3 py-2 rounded-lg border border-white/20 text-sm text-yellow-100 hover:bg-white/10 transition-all bg-white/20" data-style="gentle">温柔抚慰</button>
                                <button onclick="setStyle('cheerful')" class="style-btn px-3 py-2 rounded-lg border border-white/20 text-sm text-yellow-100 hover:bg-white/10 transition-all" data-style="cheerful">俏皮可爱</button>
                                <button onclick="setStyle('poetic')" class="style-btn px-3 py-2 rounded-lg border border-white/20 text-sm text-yellow-100 hover:bg-white/10 transition-all" data-style="poetic">诗意深沉</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-purple-200 text-sm mb-2 font-medium">自定义寄语（可选，留空则随机生成）</label>
                            <textarea id="customMessage" rows="3" placeholder="想对主人说的悄悄话..." 
                                class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-yellow-50 placeholder-white/30 transition-all resize-none"></textarea>
                        </div>

                        <div>
                            <label class="block text-purple-200 text-sm mb-2 font-medium">主人称呼</label>
                            <input type="text" id="ownerName" placeholder="例如：铲屎官、妈妈、爸爸..." 
                                class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-yellow-50 placeholder-white/30 transition-all">
                        </div>

                        <div>
                            <label class="block text-purple-200 text-sm mb-2 font-medium">主人头像（可选）</label>
                            <input type="file" id="ownerAvatar" accept="image/*"
                                class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2.5 text-yellow-50 text-sm transition-all file:mr-3 file:rounded-md file:border-0 file:bg-yellow-600/80 file:px-3 file:py-1.5 file:text-white hover:file:bg-yellow-500/90">
                            <div class="mt-2 flex items-center gap-3">
                                <div id="ownerAvatarPreview" class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-sm text-white/50">👤</div>
                                <button type="button" onclick="clearOwnerAvatar()" class="text-xs text-yellow-100/80 hover:text-yellow-100 underline underline-offset-2">清除头像</button>
                            </div>
                        </div>

                        <button onclick="generateTicket()" 
                            class="print-btn w-full bg-gradient-to-r from-yellow-600 to-yellow-700 hover:from-yellow-500 hover:to-yellow-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-yellow-900/30 transition-all flex items-center justify-center gap-2 text-lg">
                            <span>🖨️</span> 生成纪念票根
                        </button>
                    </div>
                </div>

                <!-- 使用说明 -->
                <div class="bg-white/5 backdrop-blur-sm rounded-xl p-5 border border-white/10 text-sm text-purple-200/60">
                    <h3 class="text-yellow-200/80 font-bold mb-2 flex items-center gap-2">
                        <span>💡</span> 使用说明
                    </h3>
                    <ul class="space-y-1.5 list-disc list-inside">
                        <li>填写喵星人的名字和抵达喵星的日期</li>
                        <li>可输入主人称呼，寄语中的名字会自动替换</li>
                        <li>支持上传主人头像，生成卡片会带上头像</li>
                        <li>选择寄语风格或输入宠物想对主人说的话</li>
                        <li>点击"生成纪念票根"预览效果</li>
                        <li>点击“下载图片”直接导出 PNG（手机端也可保存）</li>
                    </ul>
                </div>
            </div>

            <!-- 右侧：票根预览 -->
            <div class="lg:sticky lg:top-8">
                <div class="bg-white/5 backdrop-blur-sm rounded-2xl p-6 md:p-8 border border-white/10 shadow-2xl">
                    <h2 class="text-xl font-bold text-yellow-100 mb-6 flex items-center gap-2">
                        <span class="text-2xl">🎟️</span> 预览区域
                    </h2>
                    
                    <div id="ticketContainer" class="flex flex-col items-center">
                        <!-- 默认空状态 -->
                        <div class="text-center py-12 text-white/30">
                            <img src="image.png" alt="预览" class="w-24 h-24 mx-auto mb-4 rounded-lg object-cover opacity-60" />
                            <p>请填写票根信息并点击生成</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 寄语库
        const OWNER_TOKEN = '{{owner}}';
        const QUOTES_FILE_PATH = './quotes.txt';
        // 在这里填入非空文本后，二维码会变成可扫码并返回该文本。
        const SCANNABLE_QR_TEXT = '';
        let ownerAvatarDataUrl = '';
        let quotesLoaded = false;
        let quotesLoadPromise = null;

        const messages = {
            gentle: [
                "{{owner}}，我在喵星一切都好。这里的阳光永远温暖，罐头永远管够。你不要总是哭鼻子哦，我会一直趴在云朵上看着你。记得按时吃饭，好好睡觉，这样我才能放心地做我的小天使。",
                "亲爱的{{owner}}，喵星的门铃是我按响的。这里有很多新朋友，但我最想念的还是你膝盖的温度。不要太快忘记我，但也不要让悲伤停留太久。你要替我多吃几个罐头，看更多的日落。",
                "我到了，这里比想象中还要漂亮。有永远追不完的激光点，和永远不会打翻的猫爬架。{{owner}}，我把九条命都换成了守护你的星星。晚上抬头看看天空，最亮的那颗就是我。",
                "不要为我难过太久哦。我只是提前去喵星占了个好位置，等你很久很久以后来的时候，我就来接你。在那之前，要替我好好爱这个世界，爱新的猫咪，也爱你自己。",
                "{{owner}}，谢谢你给我一个温暖的家。我现在每天在喵星晒太阳、追流星。请不要再自责，你给了我最好的一生。接下来，请好好爱自己，我也会在梦里蹭蹭你。",
                "{{owner}}，你摸过我耳后的每一次轻轻揉捏，我都记得。现在轮到我在星光里守着你。你要把日子过得软软暖暖，就像你曾经抱着我那样。",
                "亲爱的{{owner}}，如果想我了，就把手心贴在胸口。那一阵忽然安静下来的心跳，就是我在说：别怕，我还在。",
                "{{owner}}，我把你的名字藏进了喵星的晚风里。每当你走过夜路，风轻轻碰你一下，那是我在蹭你的裤脚。",
                "谢谢{{owner}}教会我被爱是什么样子。以后你也要像爱我一样爱自己，按时睡觉、认真吃饭、偶尔去晒太阳。"
            ],
            cheerful: [
                "报告{{owner}}！本喵已成功登陆喵星！这里的WiFi信号满格，小鱼干无限量供应！你在地球要好好搬砖，给我买不了罐头了但你要给自己买好吃的！不许偷懒不铲...啊不对，你现在不用铲了！开心点！",
                "嗨！是我！我已经在喵星混成老大了！这里的猫都得听我的，因为我有最棒的{{owner}}教我的本领。你要继续威风哦，别被别的猫（或者人）欺负了！我会从星星上给你发射好运光线的！biu~",
                "{{owner}}！喵星的云是棉花糖味的！我每天都在这里跑酷，没有沙发可以抓，但有彩虹可以爬！你不要太想我，想我的时候就吃顿好的，就当是替我吃的！爱你喵！",
                "叮咚~你的小可爱已抵达目的地！五星好评！喵星服务很好，就是有点想你。不过没关系，我派了一只蝴蝶、一片落叶、一阵微风当你的新保镖，它们都是我哦！",
                "喵星政府认证：{{owner}}是满分主人！这里有小鱼干云、彩虹滑梯，不用担心我。你也要按时下班，和朋友欢笑，好好照顾自己，不然我会喵喵叫提醒你的。",
                "{{owner}}快看！我在喵星学会了后空翻和太空漂移，已经是猫咪特技队队长啦。你也要像我一样，跌倒了就抖抖毛继续往前走！",
                "好消息播报：{{owner}}今日份幸运值已被我偷偷拉满。出门不堵车，点外卖不踩雷，晚上还能做个甜甜的梦，喵呜认证！",
                "{{owner}}，我把你给我的勇气装进了小铃铛。现在每次铃铛一响，就会有一颗小好运落在你肩膀上。"
            ],
            poetic: [
                "我穿越了那道彩虹桥，抵达了没有离别的地方。这里的月光是银色的毛线，银河是流淌的猫薄荷。{{owner}}，生命是不断的相遇与告别，而我只是提前去了下一个转角。当你感到一阵莫名的温暖，那就是我。",
                "从这一刻起，我成为了永恒的一部分。化作春泥，化作晨露，化作你窗台上那一缕不肯离去的夕阳。不要寻找我，我无处不在。在每一声喵呜的回响里，在每一个温柔的梦境边缘。",
                "死亡不是终点，遗忘才是。所以请你记得我，但不必沉溺于悲伤。我是你爱过的一只猫，这本身就是宇宙间最了不起的奇迹。现在，让我成为守护你的星尘，直到时间的尽头。",
                "我卸下了沉重的肉身，化作轻盈的光。喵星没有钟表，所以我不会老去；没有围墙，所以我自由奔跑。而你在地球上的每一次微笑，都会变成我这里的星光。请多微笑，为了我。",
                "我已经把痛苦留在了地球，现在轻盈得像一朵云。谢谢{{owner}}陪我走过那段时光，如今请把温柔留给自己。当你想我时，抬头看看夜空，最亮的那颗是我在眨眼。",
                "{{owner}}，我们在同一片夜色下，只是站在不同的岸。你看见月亮时，我也看见你；你轻声唤我时，风会替我回答。",
                "我把爪印留在了时间的缝隙里。往后漫长岁月中，凡是让你忽然鼻尖一酸又心里一暖的瞬间，都是我在与你重逢。",
                "亲爱的{{owner}}，你给予我的爱并未结束，它只是换了一种形状：落在清晨窗帘边，落在晚归路灯下，落在你仍愿意温柔生活的每一天。"
            ]
        };

        function normalizeOwnerAlias(text) {
            let normalized = text.trim();
            if (!normalized) return '';
            normalized = normalized.replace(/[“”]/g, '').replace(/^["']|["',，。]$/g, '');
            normalized = normalized
                .replaceAll('铲屎官', OWNER_TOKEN)
                .replaceAll('主人主人', `${OWNER_TOKEN}，`)
                .replaceAll('主人', OWNER_TOKEN)
                .replaceAll('亲爱的，', `亲爱的${OWNER_TOKEN}，`)
                .replaceAll('亲爱的,', `亲爱的${OWNER_TOKEN},`);
            return normalized;
        }

        function classifyMessageStyle(text) {
            if (/报告|叮咚|biu|政府认证|跑酷|好消息/.test(text)) return 'cheerful';
            if (/死亡|永恒|宇宙|星尘|彩虹桥|月光|灵魂|晨露|夕阳|时间/.test(text)) return 'poetic';
            return 'gentle';
        }

        function mergeMessages(style, items) {
            const pool = messages[style];
            const exists = new Set(pool);
            items.forEach((item) => {
                if (item && !exists.has(item)) {
                    pool.push(item);
                    exists.add(item);
                }
            });
        }

        function parseQuotesFile(content) {
            const grouped = { gentle: [], cheerful: [], poetic: [] };
            let currentStyle = '';

            content
                .split(/\r?\n/)
                .map((line) => line.trim())
                .forEach((line) => {
                    if (!line || line.startsWith('//')) return;

                    const header = line.toLowerCase();
                    if (header === '# gentle' || header === '[gentle]') {
                        currentStyle = 'gentle';
                        return;
                    }
                    if (header === '# cheerful' || header === '[cheerful]') {
                        currentStyle = 'cheerful';
                        return;
                    }
                    if (header === '# poetic' || header === '[poetic]') {
                        currentStyle = 'poetic';
                        return;
                    }

                    let normalized = normalizeOwnerAlias(line);
                    normalized = normalized.replace(/^"|"[,]?$/g, '');
                    if (!normalized || normalized.length < 5) return;

                    const style = currentStyle || classifyMessageStyle(normalized);
                    grouped[style].push(normalized);
                });

            return grouped;
        }

        async function loadMessagesFromTxt() {
            if (quotesLoaded) return true;
            if (quotesLoadPromise) return quotesLoadPromise;

            quotesLoadPromise = (async () => {
            try {
                const resp = await fetch(QUOTES_FILE_PATH, { cache: 'no-cache' });
                if (!resp.ok) return false;
                const content = await resp.text();
                const grouped = parseQuotesFile(content);

                const hasAnyExternal = grouped.gentle.length || grouped.cheerful.length || grouped.poetic.length;
                if (!hasAnyExternal) return false;

                messages.gentle = [];
                messages.cheerful = [];
                messages.poetic = [];

                mergeMessages('gentle', grouped.gentle);
                mergeMessages('cheerful', grouped.cheerful);
                mergeMessages('poetic', grouped.poetic);
                quotesLoaded = true;
                return true;
            } catch (err) {
                console.warn('语录加载失败，已使用内置寄语。', err);
                return false;
            }
            })();

            const loaded = await quotesLoadPromise;
            quotesLoadPromise = null;
            return loaded;
        }

        function applyOwnerToken(text, ownerName) {
            return text.replaceAll(OWNER_TOKEN, ownerName);
        }

        let currentStyle = 'gentle';

        function setStyle(style) {
            currentStyle = style;
            document.querySelectorAll('.style-btn').forEach(btn => {
                if(btn.dataset.style === style) {
                    btn.classList.add('bg-white/20', 'border-yellow-400/50');
                    btn.classList.remove('border-white/20');
                } else {
                    btn.classList.remove('bg-white/20', 'border-yellow-400/50');
                    btn.classList.add('border-white/20');
                }
            });
        }

        // 初始化日期为今天
        document.getElementById('arrivalDate').valueAsDate = new Date();

        function generateTicketId() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let id = 'MEOW-';
            for(let i=0; i<6; i++) id += chars[Math.floor(Math.random()*chars.length)];
            return id;
        }

        function escapeHtml(text) {
            return text
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderOwnerAvatarPreview() {
            const preview = document.getElementById('ownerAvatarPreview');
            if (!preview) return;

            if (ownerAvatarDataUrl) {
                preview.innerHTML = `<img src="${ownerAvatarDataUrl}" alt="头像预览" class="w-full h-full rounded-full object-cover">`;
            } else {

        }

        function clearOwnerAvatar() {
            ownerAvatarDataUrl = '';
            const input = document.getElementById('ownerAvatar');
            if (input) input.value = '';
            renderOwnerAvatarPreview();
        }

        function generateDecorativeQR() {
            const size = 80;
            const cellSize = size / 25;
            const canvas = document.createElement('canvas');
            canvas.width = size * 4;
            canvas.height = size * 4;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f5f5dc';
            ctx.fillRect(0, 0, size * 4, size * 4);
            ctx.fillStyle = '#2d2d2d';
            for (let i = 0; i < 25; i++) {
                for (let j = 0; j < 25; j++) {
                    if (Math.random() > 0.5) {
                        ctx.fillRect(i * cellSize * 4, j * cellSize * 4, cellSize * 4, cellSize * 4);
                    }
                }
            }
            const pos = [[2,2,7], [16,2,7], [2,16,7]];
            pos.forEach(([x, y, s]) => {
                ctx.strokeStyle = '#2d2d2d';
                ctx.lineWidth = cellSize * 4;
                ctx.strokeRect(x * cellSize * 4, y * cellSize * 4, s * cellSize * 4, s * cellSize * 4);
                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect((x + 1) * cellSize * 4, (y + 1) * cellSize * 4, (s - 2) * cellSize * 4, (s - 2) * cellSize * 4);
                ctx.strokeStyle = '#2d2d2d';
                ctx.strokeRect((x + 2) * cellSize * 4, (y + 2) * cellSize * 4, (s - 4) * cellSize * 4, (s - 4) * cellSize * 4);
            });
            return canvas.toDataURL('image/png');
        }

        function generateScannableQR(text) {
            if (!text || !window.qrcode) return '';
            try {
                const qr = qrcode(0, 'M');
                qr.addData(text);
                qr.make();
                const modules = qr.getModuleCount();
                const cellSize = 3 * 4;
                const margin = 2;
                const size = modules * cellSize + margin * 2 * cellSize;
                const c = document.createElement('canvas');
                c.width = size;
                c.height = size;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#f5f5dc';
                ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#2d2d2d';
                for (let row = 0; row < modules; row++) {
                    for (let col = 0; col < modules; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(
                                col * cellSize + margin * cellSize,
                                row * cellSize + margin * cellSize,
                                cellSize, cellSize
                            );
                        }
                    }
                }
                return c.toDataURL('image/png');
            } catch (err) {
                console.warn('可扫码二维码生成失败，已回退装饰二维码。', err);
                return '';
            }
        }

        async function generateTicket() {
            await loadMessagesFromTxt();

            const catName = document.getElementById('catName').value || '未知喵星人';
            const arrivalDate = document.getElementById('arrivalDate').value || new Date().toISOString().split('T')[0];
            const catSign = document.getElementById('catSign').value;
            const customMsg = document.getElementById('customMessage').value;
            const ownerName = document.getElementById('ownerName').value || '铲屎官';
            
            const dateObj = new Date(arrivalDate);
            const dateStr = `${dateObj.getFullYear()}年${dateObj.getMonth()+1}月${dateObj.getDate()}日`;
            
            // 选择寄语
            let finalMessage;
            if(customMsg.trim()) {
                finalMessage = applyOwnerToken(customMsg, ownerName);
            } else {
                const pool = messages[currentStyle];
                finalMessage = applyOwnerToken(pool[Math.floor(Math.random() * pool.length)], ownerName);
            }
            
            const ticketId = generateTicketId();
            const qrData = generateScannableQR(SCANNABLE_QR_TEXT.trim()) || generateDecorativeQR();
            const ownerAvatarHtml = ownerAvatarDataUrl
                ? `<img src="${ownerAvatarDataUrl}" alt="主人头像" class="w-10 h-10 rounded-full object-cover border border-yellow-800/30">`
                : '<div class="w-10 h-10 rounded-full bg-yellow-800/20 flex items-center justify-center text-xl">👤</div>';
            
            // 星座显示
            const signHtml = catSign ? `<span class="mx-2 text-yellow-700/40">|</span><span class="text-yellow-800">${catSign}</span>` : '';
            
            const ticketHTML = `
                <div class="w-full flex flex-col items-center">
                <div id="ticketCard" class="ticket-paper w-full max-w-md mx-auto rounded-lg shadow-2xl overflow-hidden relative tear-edge" style="min-height: 600px;">
                    <!-- 顶部装饰 -->
                    <div class="h-2 bg-gradient-to-r from-yellow-700 via-yellow-600 to-yellow-700"></div>
                    
                    <!-- 票根内容 -->
                    <div class="p-8 ticket-texture">
                        <!-- 标题区 -->
                        <div class="text-center mb-6 relative">
                            <div class="absolute -top-2 -right-2 stamp px-3 py-1 text-xs rounded opacity-60">已抵达</div>
                            <div class="text-4xl mb-2">🌟</div>
                            <h3 class="text-2xl font-black text-yellow-900 tracking-widest" style="font-family: 'ZCOOL XiaoWei', serif;">喵星抵达证明</h3>
                            <div class="text-xs text-yellow-700/60 mt-1 tracking-[0.3em]">ARRIVAL CERTIFICATE</div>
                        </div>
                        
                        <!-- 分割线 -->
                        <div class="perforation mb-6"></div>
                        
                        <!-- 乘客信息 -->
                        <div class="bg-yellow-900/5 rounded-lg p-4 mb-6 border border-yellow-900/10">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <div class="text-xs text-yellow-700/60 uppercase tracking-wider mb-1">Passenger Name</div>
                                    <div class="text-xl font-bold text-yellow-900">${catName}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-yellow-700/60 uppercase tracking-wider mb-1">Class</div>
                                    <div class="text-sm font-bold text-yellow-800">头等舱</div>
                                </div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <div class="text-xs text-yellow-700/60 uppercase tracking-wider mb-1">Date of Arrival</div>
                                    <div class="text-sm font-bold text-yellow-900">${dateStr}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-yellow-700/60 uppercase tracking-wider mb-1">Constellation</div>
                                    <div class="text-sm font-bold text-yellow-800">${catSign || '喵座'}</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 寄语区 -->
                        <div class="mb-6 relative">
                            <div class="absolute -top-3 left-4 bg-[#f5f5dc] px-2 text-xs text-yellow-700/60 uppercase tracking-wider">Message to Earth</div>
                            <div class="border-2 border-yellow-900/20 rounded-lg p-4 pt-5">
                                <p class="handwritten text-yellow-900 leading-relaxed text-sm md:text-base">
                                    ${finalMessage}
                                </p>
                                <div class="text-right mt-3 text-yellow-800/60 text-sm handwritten">
                                    —— 爱你的 ${catName}
                                </div>
                            </div>
                        </div>
                        
                        <!-- 主人信息 -->
                        <div class="flex items-center gap-3 mb-6 bg-yellow-900/5 rounded-lg p-3 border border-yellow-900/10">
                            ${ownerAvatarHtml}
                            <div>
                                <div class="text-xs text-yellow-700/60">Recipient (Owner)</div>
                                <div class="text-sm font-bold text-yellow-900">${ownerName} 收</div>
                            </div>
                        </div>
                        
                        <!-- 底部信息 -->
                        <div class="flex justify-between items-end">
                            <div class="space-y-1">
                                <div class="text-[10px] text-yellow-700/40 tracking-wider">TICKET NO.</div>
                                <div class="text-xs font-mono font-bold text-yellow-800 tracking-widest">${ticketId}</div>
                                <div class="text-[10px] text-yellow-700/40 mt-2">ISSUED BY MEOW STAR ALLIANCE</div>
                            </div>
                            <div class="w-20 h-20 opacity-80">
                                <img src="${qrData}" alt="QR" class="w-full h-full" />
                            </div>
                        </div>
                        
                        <!-- 猫爪印装饰 -->
                        <div class="absolute bottom-4 left-4 opacity-10 text-6xl rotate-12">🐾</div>
                        <div class="absolute top-1/3 right-4 opacity-10 text-4xl -rotate-12">🐾</div>
                    </div>
                    
                    <!-- 底部锯齿 -->
                    <div class="h-4 bg-gradient-to-r from-yellow-700 via-yellow-600 to-yellow-700"></div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="mt-6 flex gap-3 justify-center flex-wrap">
                    <button onclick="downloadTicketImage()" class="bg-white/10 hover:bg-white/20 text-yellow-100 px-6 py-2 rounded-lg border border-white/20 transition-all flex items-center gap-2 text-sm">
                        <span>🖼️</span> 下载图片
                    </button>
                    <button onclick="generateTicket()" class="bg-white/10 hover:bg-white/20 text-yellow-100 px-6 py-2 rounded-lg border border-white/20 transition-all flex items-center gap-2 text-sm">
                        <span>🔄</span> 换一句寄语
                    </button>
                </div>
                </div>
            `;
            
            document.getElementById('ticketContainer').innerHTML = ticketHTML;
            
            // 滚动到预览区（移动端）
            if(window.innerWidth < 1024) {
                document.getElementById('ticketContainer').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        async function downloadTicketImage() {
            try {
                const ticketElement = document.getElementById('ticketCard');
                if (!ticketElement) {
                    alert('请先生成纪念票根');
                    return;
                }

                const catName = document.getElementById('catName').value || '喵星人';
                const safeName = catName.replace(/[\\/:*?"<>|]/g, '_');
                const fileName = `${safeName}-喵星抵达证明.png`;
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

                const scale = Math.max(2, Math.min(3, window.devicePixelRatio || 1));
                
                const canvas = await html2canvas(ticketElement, {
                    scale,
                    useCORS: true,
                    backgroundColor: '#f5f5dc',
                    onclone: async (clonedDoc) => {
                        const clonedTicket = clonedDoc.getElementById('ticketCard');
                        if (clonedTicket) {
                            clonedTicket.style.maskImage = 'none';
                            clonedTicket.style.webkitMaskImage = 'none';
                            clonedTicket.style.backgroundImage = 'linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%)';
                        }
                        const allElements = clonedTicket ? clonedTicket.querySelectorAll('*') : [];
                        allElements.forEach(el => {
                            const computed = clonedDoc.defaultView.getComputedStyle(el);
                            if (computed.maskImage && computed.maskImage.includes('svg')) {
                                el.style.maskImage = 'none';
                            }
                            if (computed.webkitMaskImage && computed.webkitMaskImage.includes('svg')) {
                                el.style.webkitMaskImage = 'none';
                            }
                            if (computed.backgroundImage && computed.backgroundImage.includes('data:image/svg')) {
                                el.style.backgroundImage = 'none';
                            }
                        });
                        const svgImgs = clonedTicket ? clonedTicket.querySelectorAll('img[src^="data:image/svg"]') : [];
                        for (const img of svgImgs) {
                            try {
                                const imgEl = new Image();
                                imgEl.crossOrigin = 'anonymous';
                                await new Promise((resolve, reject) => {
                                    imgEl.onload = resolve;
                                    imgEl.onerror = reject;
                                    imgEl.src = img.getAttribute('src');
                                });
                                const c = clonedDoc.createElement('canvas');
                                c.width = imgEl.naturalWidth || 80;
                                c.height = imgEl.naturalHeight || 80;
                                const ctx = c.getContext('2d');
                                ctx.drawImage(imgEl, 0, 0);
                                img.setAttribute('src', c.toDataURL('image/png'));
                            } catch(e) {
                                img.setAttribute('src', '');
                            }
                        }
                    }
                });

                if (isIOS || isSafari) {
                    try {
                        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
                        if (!blob) {
                            alert('图片生成失败，请重试。');
                            return;
                        }
                        
                        const url = URL.createObjectURL(blob);
                        
                        if (isIOS) {
                            let overlay = document.getElementById('iosSaveOverlay');
                            if (!overlay) {
                                overlay = document.createElement('div');
                                overlay.id = 'iosSaveOverlay';
                                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
                                overlay.innerHTML = `
                                    <div style="position:absolute;top:16px;right:16px;cursor:pointer;color:#fff;font-size:28px;padding:8px;" onclick="document.getElementById('iosSaveOverlay').style.display='none'">✕</div>
                                    <img id="iosSaveImg" style="max-width:100%;max-height:70vh;height:auto;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);" />
                                    <div style="color:#fff;margin-top:20px;text-align:center;">
                                        <p style="font-size:16px;margin:0 0 8px;">👆 长按上方图片</p>
                                        <p style="font-size:14px;opacity:0.7;margin:0;">选择"存储图像"保存到相册</p>
                                    </div>
                                `;
                                document.body.appendChild(overlay);
                            }
                            overlay.querySelector('#iosSaveImg').src = url;
                            overlay.style.display = 'flex';
                        } else {
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = fileName;
                            document.body.appendChild(a);
                            a.click();
                            a.remove();
                            setTimeout(() => URL.revokeObjectURL(url), 1000);
                        }
                    } catch (iosError) {
                        console.error('iOS download error:', iosError);
                        alert('iOS 下载需要您截图保存。请同时按住电源键和音量键截图。');
                    }
                    return;
                }

                canvas.toBlob((blob) => {
                    if (!blob) {
                        alert('图片生成失败，请重试。');
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.target = '_self';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                }, 'image/png');
            } catch (error) {
                console.error('Download error:', error);
                alert('导出失败: ' + (error.message || '请稍后重试'));
            }
        }

        // 初始化样式按钮状态
        setStyle('gentle');
        renderOwnerAvatarPreview();

        document.getElementById('ownerAvatar').addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) {
                ownerAvatarDataUrl = '';
                renderOwnerAvatarPreview();
                return;
            }
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件。');
                e.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = () => {
                ownerAvatarDataUrl = String(reader.result || '');
                renderOwnerAvatarPreview();
            };
            reader.readAsDataURL(file);
        });

        // 回车生成
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    generateTicket();
                }
            });
        });
    </script>
